<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaan Turgut</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background: #FAF7F2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .profile {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #EDE0CF;
      border: 2px solid #D4B896;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .avatar span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 600;
      color: #7A5230;
      letter-spacing: 2px;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: #2E1F10;
      letter-spacing: 0.5px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #FFFFFF;
      border: 1px solid #EAE0D5;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: #2E1F10;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .link-card:hover {
      background: #FDF6EE;
      border-color: #C9A87A;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(122, 82, 48, 0.10);
    }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-text { flex: 1; }

    .link-label {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: #2E1F10;
    }

    .link-handle {
      font-size: 0.78rem;
      font-weight: 300;
      color: #A08060;
      margin-top: 2px;
    }

    .arrow {
      font-size: 1rem;
      color: #C9A87A;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.18s, transform 0.18s;
    }

    .link-card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.72rem;
      font-weight: 300;
      color: #C4A882;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .icon-linkedin  { background: #EDF3FB; }
    .icon-linkedin svg  { fill: #0A66C2; }
    .icon-youtube   { background: #FEEEED; }
    .icon-youtube svg   { fill: #FF0000; }
    .icon-instagram { background: #FEF0F7; }
    .icon-instagram svg { fill: #C13584; }
    .icon-twitter   { background: #F0F7FE; }
    .icon-twitter svg   { fill: #1DA1F2; }
    .icon-tiktok    { background: #F0FAFA; }
    .icon-tiktok svg    { fill: #010101; }
    .icon-github    { background: #F4F4F4; }
    .icon-github svg    { fill: #181717; }
  </style>
